server {
    listen 80 default_server;
    server_name _;

    root /usr/local/var/focus;
    index index.html;

    location / {
        try_files $uri /index.html;
    }
}

server {
    listen 443 ssl default_server;
    server_name _;

    ssl_certificate     /usr/local/var/focus/certs/cert.pem;
    ssl_certificate_key /usr/local/var/focus/certs/key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    root /usr/local/var/focus;
    index index.html;

    location / {
        try_files $uri /index.html;
    }
}
