# --- Pane Splitting (intuitive keys) ---
bind | split-window -h -c "#{pane_current_path}"
bind \\ split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# --- Pane Navigation (Alt+Arrow, no prefix needed) ---
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# --- Window (Tab) Management ---
# Create new window (tab): Prefix + c  (default, kept)
# Next/prev window (Ctrl+Left/Right, no prefix needed):
bind -n C-Left previous-window
bind -n C-Right next-window
# Rename window (tab): Prefix + ,  (default, kept)
# Quick rename shortcut:
bind r command-prompt -I "#W" "rename-window '%%'"

# --- Pane Titles & Borders ---
set -g pane-border-status top
set -g pane-border-format ' #{pane_index}: #{?#{@pane_manual},#{@pane_manual},#(cd #{pane_current_path} && git branch --show-current 2>/dev/null || echo "—")} '
set -g pane-border-style 'fg=colour239'
set -g pane-active-border-style 'fg=colour172'
set -g pane-border-lines heavy
bind t command-prompt -p "Pane title:" "set-option -p @pane_manual '%%'"

# --- Window Numbering ---
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# --- Quality of Life ---
set -g history-limit 10000
set -g display-time 2000
set -sg escape-time 0
setw -g mode-keys vi
set -g monitor-bell on
set -g bell-action other
set -g visual-bell off

# --- Status Bar (gruvbox dark) ---
set -g status-style 'bg=colour237 fg=colour223'
set -g status-left '#[bg=colour241,fg=colour223,bold] #S #[bg=colour237] '
set -g status-right-length 80
set -g status-interval 5
set -g status-right '#[fg=colour246] #(~/.tmux/tmux-status.sh) #[fg=colour223]%H:%M '
setw -g window-status-style 'fg=colour246 bg=colour237'
setw -g window-status-current-style 'fg=colour235,bg=colour172,bold'
setw -g window-status-format ' #I:#W '
setw -g window-status-current-format ' #I:#W '
setw -g window-status-bell-style 'fg=colour235,bg=colour167,bold'
set -g message-style 'bg=colour239 fg=colour223'
set -g message-command-style 'bg=colour239 fg=colour223'
