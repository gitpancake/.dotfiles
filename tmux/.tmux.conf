# --- Pane Splitting (intuitive keys) ---
bind | split-window -h -c "#{pane_current_path}"
bind \\ split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# --- Pane Navigation (Alt+Arrow, no prefix needed) ---
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# --- Window (Tab) Management ---
# Create new window (tab): Prefix + c  (default, kept)
# Next/prev window (Ctrl+Left/Right, no prefix needed):
bind -n C-Left previous-window
bind -n C-Right next-window
# Rename window (tab): Prefix + ,  (default, kept)
# Quick rename shortcut:
bind r command-prompt -I "#W" "rename-window '%%'"

# --- Pane Titles ---
set -g pane-border-status top
set -g pane-border-format ' #{pane_index}: #{@pane_label} '
bind t command-prompt -p "Pane title:" "set-option -p @pane_manual '%%'"

# --- Window Numbering ---
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# --- Quality of Life ---
set -g history-limit 10000
set -g display-time 2000
set -sg escape-time 0
setw -g mode-keys vi

# --- Status Bar ---
set -g status-style 'bg=colour235 fg=colour255'
set -g status-left '#[fg=colour46,bold] #S '
set -g status-right '#[fg=colour250] %H:%M '
setw -g window-status-current-style 'fg=colour46,bold'
setw -g window-status-format ' #I:#W '
setw -g window-status-current-format ' #I:#W '
